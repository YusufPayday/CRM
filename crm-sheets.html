<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liidien hallinta — Kevytyrittäjyys</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}

  .topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;gap:10px}
  .topbar h1{font-size:16px;font-weight:600;white-space:nowrap}
  .topbar .right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sync-badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500}
  .sync-ok{background:#dcfce7;color:#166534}
  .sync-err{background:#fee2e2;color:#7f1d1d}
  .sync-loading{background:#fef9c3;color:#854d0e}

  /* Login screen */
  .login-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;align-items:center;justify-content:center;z-index:9999}
  .login-box{background:#fff;border:1px solid #e5e5e3;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center}
  .login-box h2{font-size:18px;font-weight:600;margin-bottom:4px}
  .login-box p{font-size:13px;color:#888;margin-bottom:1.5rem}
  .login-box input{font-size:15px;padding:10px 14px;border:1px solid #e0e0de;border-radius:9px;width:100%;outline:none;margin-bottom:10px;text-align:center;letter-spacing:2px;color:#1a1a1a}
  .login-box input:focus{border-color:#185FA5}
  .login-box button{font-size:14px;padding:10px;border-radius:9px;border:none;background:#185FA5;color:#fff;width:100%;cursor:pointer;font-weight:500}
  .login-box button:hover{background:#0C447C}
  .login-error{font-size:12px;color:#dc2626;margin-top:8px;min-height:18px}
  .login-lock{font-size:32px;margin-bottom:1rem}

  /* Setup banner */
  .setup-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1.5rem}
  .setup-banner h2{font-size:14px;font-weight:600;margin-bottom:8px;color:#1e40af}
  .setup-banner p{font-size:13px;color:#1e40af;margin-bottom:10px;line-height:1.5}
  .setup-banner input{font-size:13px;padding:7px 10px;border:1px solid #93c5fd;border-radius:7px;width:100%;max-width:500px;margin-bottom:8px;outline:none;color:#1a1a1a}
  .setup-banner input:focus{border-color:#185FA5}

  .container{max-width:1300px;margin:0 auto;padding:1.5rem}

  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
  @media(max-width:700px){.metrics{grid-template-columns:1fr 1fr}}
  .metric{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:14px 16px}
  .metric .lbl{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
  .metric .val{font-size:24px;font-weight:600}
  .metric .sub{font-size:11px;color:#aaa;margin-top:2px}

  .toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
  .toolbar input,.toolbar select{font-size:13px;padding:7px 10px;border:1px solid #e0e0de;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
  .toolbar input:focus,.toolbar select:focus{border-color:#185FA5}
  .toolbar input[type=text]{width:200px}
  .view-toggle{display:flex;border:1px solid #e0e0de;border-radius:8px;overflow:hidden;margin-left:auto}
  .view-toggle button{font-size:12px;padding:6px 14px;border:none;background:#fff;color:#666;cursor:pointer;font-family:inherit}
  .view-toggle button.active{background:#185FA5;color:#fff;font-weight:500}

  .pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:start}
  @media(max-width:1000px){.pipeline{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:500px){.pipeline{grid-template-columns:1fr 1fr}}
  .col-head{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;justify-content:space-between}
  .col-head .cnt{background:#f0f0ee;color:#666;font-size:10px;padding:1px 7px;border-radius:99px}
  .card{background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:#aaa}
  .card.sel{border-color:#185FA5;box-shadow:0 0 0 2px #dbeafe}
  .card .cn{font-size:13px;font-weight:600}
  .card .ct{font-size:11px;color:#888;margin-top:1px}
  .card .bottom{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
  .t-uusi{background:#dbeafe;color:#1e40af}
  .t-soitettu{background:#dcfce7;color:#166534}
  .t-kiinnostunut{background:#fef9c3;color:#854d0e}
  .t-tarjous{background:#ede9fe;color:#4c1d95}
  .t-voitettu{background:#bbf7d0;color:#14532d}
  .t-havitty{background:#fee2e2;color:#7f1d1d}
  .prio-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .p-korkea{background:#ef4444}
  .p-normaali{background:#f59e0b}
  .p-matala{background:#94a3b8}
  .card .nxt{font-size:10px;color:#aaa;margin-top:5px}
  .card .nxt.overdue{color:#ef4444;font-weight:500}
  .empty-col{font-size:11px;color:#ccc;text-align:center;padding:1rem 0;border:1px dashed #e0e0de;border-radius:8px}

  .list-wrap{background:#fff;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden;display:none}
  .list-wrap table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  .list-wrap th{font-size:11px;font-weight:600;color:#888;text-align:left;padding:10px 12px;border-bottom:1px solid #e5e5e3;text-transform:uppercase;letter-spacing:.3px;background:#fafaf9}
  .list-wrap td{padding:10px 12px;border-bottom:1px solid #f0f0ee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .list-wrap tr:last-child td{border-bottom:none}
  .list-wrap tr:hover td{background:#fafaf9;cursor:pointer}
  .list-wrap tr.sel td{background:#eff6ff}

  .panel{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1.5rem;margin-top:1.25rem}
  .panel-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
  .panel-head h2{font-size:16px;font-weight:600}
  .panel-head .sub{font-size:12px;color:#888;margin-top:2px}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  @media(max-width:500px){.field-grid{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.3px}
  .field input,.field select,.field textarea{font-size:13px;padding:7px 9px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:#185FA5}
  .field textarea{resize:vertical;min-height:60px}
  .notes-list{margin:10px 0}
  .note{border-left:2px solid #e0e0de;padding:5px 10px;margin-bottom:6px;font-size:12px;color:#555}
  .note .ts{font-size:10px;color:#aaa;margin-bottom:2px}
  .panel-actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}

  .btn{font-size:13px;padding:7px 14px;border:1px solid #e0e0de;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit;transition:background .1s}
  .btn:hover{background:#f5f5f3}
  .btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
  .btn-primary:hover{background:#0C447C}
  .btn-danger{color:#dc2626;border-color:#fca5a5}
  .btn-danger:hover{background:#fef2f2}
  .btn-sm{font-size:12px;padding:5px 12px;border:1px solid #e0e0de;border-radius:7px;background:#fff;color:#666;cursor:pointer;font-family:inherit}
  .btn-sm:hover{background:#f5f5f3}

  .add-panel{background:#fff;border:1px solid #185FA5;border-radius:12px;padding:1.5rem;margin-top:1.25rem}
  .add-panel h3{font-size:15px;font-weight:600;margin-bottom:1rem}

  .spinner{display:inline-block;width:12px;height:12px;border:2px solid #e0e0de;border-top-color:#185FA5;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:4px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-lock">🔒</div>
    <h2>Kevytyrittäjyys CRM</h2>
    <p>Syötä salasana kirjautuaksesi sisään</p>
    <input type="password" id="pw-input" placeholder="Salasana" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Kirjaudu sisään</button>
    <div class="login-error" id="pw-error"></div>
  </div>
</div>

<div id="app" style="display:none">
<div class="topbar">
  <h1>Kevytyrittäjyys CRM</h1>
  <div class="right">
    <span id="sync-badge" class="sync-badge sync-loading">Yhdistetään...</span>
    <button class="btn-sm" onclick="manualSync()">Synkronoi</button>
    <button class="btn btn-primary" onclick="openAdd()">+ Lisää liidi</button>
  </div>
</div>

<div class="container">
  <div id="setup-area"></div>
  <div class="metrics" id="metrics"></div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Hae yritystä tai nimeä..." oninput="renderView()">
    <select id="f-stage" onchange="renderView()">
      <option value="">Kaikki vaiheet</option>
      <option>Uusi</option><option>Soitettu</option><option>Kiinnostunut</option>
      <option>Tarjous lähetetty</option><option>Voitettu</option><option>Hävitty</option>
    </select>
    <select id="f-prio" onchange="renderView()">
      <option value="">Kaikki prioriteetit</option>
      <option>Korkea</option><option>Normaali</option><option>Matala</option>
    </select>
    <div class="view-toggle">
      <button id="vt-p" class="active" onclick="setView('pipeline')">Pipeline</button>
      <button id="vt-l" onclick="setView('list')">Lista</button>
    </div>
  </div>

  <div id="pipeline-wrap">
    <div class="pipeline" id="pipeline"></div>
  </div>
  <div class="list-wrap" id="list-wrap">
    <table>
      <thead><tr>
        <th style="width:22%">Yritys</th>
        <th style="width:15%">Yhteyshenkilö</th>
        <th style="width:13%">Vaihe</th>
        <th style="width:10%">Prioriteetti</th>
        <th style="width:22%">Seuraava toimenpide</th>
        <th style="width:11%">Päivämäärä</th>
        <th style="width:7%">Toimiala</th>
      </tr></thead>
      <tbody id="list-body"></tbody>
    </table>
  </div>

  <div id="add-area"></div>
  <div id="detail-area"></div>
</div>
</div>

<script>
const STAGES=['Uusi','Soitettu','Kiinnostunut','Tarjous lähetetty','Voitettu','Hävitty'];
const TAG={'Uusi':'t-uusi','Soitettu':'t-soitettu','Kiinnostunut':'t-kiinnostunut','Tarjous lähetetty':'t-tarjous','Voitettu':'t-voitettu','Hävitty':'t-havitty'};
const PDOT={'Korkea':'p-korkea','Normaali':'p-normaali','Matala':'p-matala'};

const SCRIPT_URL_KEY='ky_crm_script_url';
let SCRIPT_URL=localStorage.getItem(SCRIPT_URL_KEY)||'';

let leads=[];
let selected=null;
let currentView='pipeline';
let saving=false;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toISOString().slice(0,10)}
function nextId(){return Date.now()}

// ── Sync status ──
function setSyncBadge(state, text){
  const el=document.getElementById('sync-badge');
  el.className='sync-badge sync-'+state;
  el.textContent=text;
}

// ── API calls ──
async function apiGet(action){
  const url=SCRIPT_URL+'?action='+action+'&t='+Date.now();
  const res=await fetch(url);
  return res.json();
}

async function apiPost(body){
  const res=await fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify(body)
  });
  return res.json();
}

async function loadFromSheets(){
  if(!SCRIPT_URL){showSetup();return;}
  setSyncBadge('loading','Ladataan...');
  try{
    const data=await apiGet('getAll');
    if(data.error)throw new Error(data.error);
    leads=data.leads||[];
    setSyncBadge('ok','Synkronoitu ✓');
    hideSetup();
    render();
  }catch(e){
    setSyncBadge('err','Yhteysvirhe');
    showSetup(true);
  }
}

async function saveLeadToSheets(lead){
  if(!SCRIPT_URL)return;
  try{
    const {notes,...leadData}=lead;
    await apiPost({action:'saveLead',lead:leadData});
  }catch(e){setSyncBadge('err','Tallennusvirhe');}
}

async function deleteLeadFromSheets(id){
  if(!SCRIPT_URL)return;
  try{await apiPost({action:'deleteLead',id});}catch(e){}
}

async function addNoteToSheets(leadId,note){
  if(!SCRIPT_URL)return;
  try{await apiPost({action:'addNote',leadId,note});}catch(e){}
}

async function manualSync(){
  setSyncBadge('loading','Synkronoidaan...');
  try{
    await apiPost({action:'saveAll',leads});
    setSyncBadge('ok','Synkronoitu ✓');
  }catch(e){setSyncBadge('err','Virhe');}
}

// ── Setup ──
function showSetup(isError=false){
  document.getElementById('setup-area').innerHTML=`
    <div class="setup-banner">
      <h2>${isError?'Yhteysvirhe — tarkista URL':'Yhdistä Google Sheetsiin'}</h2>
      <p>Liitä tähän Google Apps Script -sovelluksesi URL (Web app URL).<br>
      Löydät sen: Apps Script → Deploy → Manage deployments → Web app URL</p>
      <input type="text" id="url-input" placeholder="https://script.google.com/macros/s/..." value="${esc(SCRIPT_URL)}">
      <br>
      <button class="btn btn-primary" onclick="saveUrl()">Yhdistä</button>
      ${isError?'<span style="font-size:12px;color:#dc2626;margin-left:10px">Tarkista että URL on oikein ja script on julkaistu.</span>':''}
    </div>
  `;
}

function hideSetup(){
  document.getElementById('setup-area').innerHTML='';
}

function saveUrl(){
  const val=document.getElementById('url-input')?.value?.trim();
  if(!val){alert('Syötä URL ensin.');return;}
  SCRIPT_URL=val;
  localStorage.setItem(SCRIPT_URL_KEY,val);
  loadFromSheets();
}

// ── Filtering ──
function filtered(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const st=document.getElementById('f-stage')?.value||'';
  const pr=document.getElementById('f-prio')?.value||'';
  return leads.filter(l=>{
    if(q&&!l.company.toLowerCase().includes(q)&&!(l.contact||'').toLowerCase().includes(q))return false;
    if(st&&l.stage!==st)return false;
    if(pr&&l.prio!==pr)return false;
    return true;
  });
}

// ── Render ──
function render(){renderMetrics();renderView();renderDetail();}

function renderMetrics(){
  const all=leads;
  const won=all.filter(l=>l.stage==='Voitettu').length;
  const active=all.filter(l=>!['Voitettu','Hävitty'].includes(l.stage)).length;
  const due=all.filter(l=>l.nextDate&&l.nextDate<=today()&&!['Voitettu','Hävitty'].includes(l.stage)).length;
  const hot=all.filter(l=>l.prio==='Korkea'&&!['Voitettu','Hävitty'].includes(l.stage)).length;
  const rate=all.length?Math.round(won/all.length*100):0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="lbl">Kaikki liidit</div><div class="val">${all.length}</div><div class="sub">listalla yhteensä</div></div>
    <div class="metric"><div class="lbl">Aktiiviset</div><div class="val">${active}</div><div class="sub">${hot} kuumaa liidiä</div></div>
    <div class="metric"><div class="lbl">Toimenpiteitä tänään</div><div class="val" style="color:${due>0?'#ef4444':'inherit'}">${due}</div><div class="sub">erääntynyt tai tänään</div></div>
    <div class="metric"><div class="lbl">Voitto-%</div><div class="val" style="color:${rate>20?'#16a34a':'inherit'}">${rate}%</div><div class="sub">${won} voitettu</div></div>
  `;
}

function renderView(){
  if(currentView==='pipeline')renderPipeline();
  else renderList();
}

function renderPipeline(){
  const f=filtered();const t=today();
  let html='';
  for(const stage of STAGES){
    const cards=f.filter(l=>l.stage===stage);
    html+=`<div>
      <div class="col-head"><span>${stage}</span><span class="cnt">${cards.length}</span></div>
      ${cards.length===0?'<div class="empty-col">—</div>':''}
      ${cards.map(l=>{
        const overdue=l.nextDate&&l.nextDate<t&&!['Voitettu','Hävitty'].includes(l.stage);
        return `<div class="card${selected===l.id?' sel':''}" onclick="selectLead('${l.id}')">
          <div class="cn">${esc(l.company)}</div>
          <div class="ct">${esc(l.contact||'')}${l.role?' · '+esc(l.role):''}</div>
          <div class="bottom">
            <span class="tag ${TAG[l.stage]||'t-uusi'}">${l.stage}</span>
            <span class="prio-dot ${PDOT[l.prio]||'p-normaali'}"></span>
          </div>
          ${l.next&&l.next!=='-'?`<div class="nxt${overdue?' overdue':''}">${esc(l.next)}${l.nextDate?' · '+l.nextDate:''}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }
  document.getElementById('pipeline').innerHTML=html;
}

function renderList(){
  const f=filtered();const t=today();
  document.getElementById('list-body').innerHTML=f.map(l=>{
    const overdue=l.nextDate&&l.nextDate<t&&!['Voitettu','Hävitty'].includes(l.stage);
    return `<tr class="${selected===l.id?'sel':''}" onclick="selectLead('${l.id}')">
      <td title="${esc(l.company)}">${esc(l.company)}</td>
      <td>${esc(l.contact||'')}</td>
      <td><span class="tag ${TAG[l.stage]||'t-uusi'}">${l.stage}</span></td>
      <td><span class="prio-dot ${PDOT[l.prio]||'p-normaali'}" style="margin-right:5px"></span>${esc(l.prio||'')}</td>
      <td>${esc(l.next||'—')}</td>
      <td style="color:${overdue?'#ef4444':'inherit'}">${l.nextDate||'—'}</td>
      <td>${esc(l.industry||'')}</td>
    </tr>`;
  }).join('');
}

function renderDetail(){
  const el=document.getElementById('detail-area');
  if(!selected){el.innerHTML='';return;}
  const l=leads.find(x=>String(x.id)===String(selected));
  if(!l){el.innerHTML='';return;}
  const t=today();
  el.innerHTML=`<div class="panel">
    <div class="panel-head">
      <div>
        <h2>${esc(l.company)}</h2>
        <div class="sub">${esc(l.contact||'')}${l.role?' · '+esc(l.role):''}${l.industry?' · '+esc(l.industry):''}</div>
      </div>
      <button class="btn" onclick="selected=null;render()">Sulje ✕</button>
    </div>
    <div class="field-grid">
      <div class="field"><label>Vaihe</label>
        <select onchange="upd('${l.id}','stage',this.value)">
          ${STAGES.map(s=>`<option${l.stage===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Prioriteetti</label>
        <select onchange="upd('${l.id}','prio',this.value)">
          ${['Korkea','Normaali','Matala'].map(p=>`<option${l.prio===p?' selected':''}>${p}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-grid">
      <div class="field"><label>Puhelin</label><input value="${esc(l.phone||'')}" onchange="upd('${l.id}','phone',this.value)"></div>
      <div class="field"><label>Sähköposti</label><input value="${esc(l.email||'')}" onchange="upd('${l.id}','email',this.value)"></div>
    </div>
    <div class="field-grid">
      <div class="field"><label>Seuraava toimenpide</label><input value="${esc(l.next||'')}" onchange="upd('${l.id}','next',this.value)"></div>
      <div class="field"><label>Päivämäärä</label><input type="date" value="${l.nextDate||''}" onchange="upd('${l.id}','nextDate',this.value)"></div>
    </div>
    <div class="field-grid">
      <div class="field"><label>Toimiala</label><input value="${esc(l.industry||'')}" onchange="upd('${l.id}','industry',this.value)"></div>
      <div class="field"><label>Rooli</label><input value="${esc(l.role||'')}" onchange="upd('${l.id}','role',this.value)"></div>
    </div>
    <div class="field" style="margin-bottom:10px"><label>Lisää muistiinpano</label>
      <div style="display:flex;gap:6px">
        <input id="ni" placeholder="Puhelun yhteenveto, sovittu asia..." style="flex:1">
        <button class="btn btn-primary" onclick="addNote('${l.id}')">Lisää</button>
      </div>
    </div>
    ${l.notes&&l.notes.length?`<div class="notes-list">${l.notes.slice().reverse().map(n=>`
      <div class="note"><div class="ts">${n.ts}</div>${esc(n.text)}</div>
    `).join('')}</div>`:'<div style="font-size:12px;color:#aaa;margin-bottom:10px">Ei muistiinpanoja vielä.</div>'}
    <div class="panel-actions">
      <button class="btn btn-danger" onclick="delLead('${l.id}')">Poista liidi</button>
    </div>
  </div>`;
}

function setView(v){
  currentView=v;
  document.getElementById('pipeline-wrap').style.display=v==='pipeline'?'':'none';
  document.getElementById('list-wrap').style.display=v==='list'?'':'none';
  document.getElementById('vt-p').className=v==='pipeline'?'active':'';
  document.getElementById('vt-l').className=v==='list'?'active':'';
  renderView();
}

function selectLead(id){
  selected=String(selected)===String(id)?null:id;
  render();
}

async function upd(id,field,val){
  const l=leads.find(x=>String(x.id)===String(id));
  if(!l)return;
  l[field]=val;
  setSyncBadge('loading','Tallennetaan...');
  await saveLeadToSheets(l);
  setSyncBadge('ok','Tallennettu ✓');
  render();
}

async function addNote(id){
  const inp=document.getElementById('ni');
  if(!inp||!inp.value.trim())return;
  const l=leads.find(x=>String(x.id)===String(id));
  if(!l)return;
  if(!l.notes)l.notes=[];
  const note={ts:today(),text:inp.value.trim()};
  l.notes.push(note);
  setSyncBadge('loading','Tallennetaan...');
  await addNoteToSheets(id,note);
  setSyncBadge('ok','Tallennettu ✓');
  render();
}

async function delLead(id){
  if(!confirm('Poistetaanko liidi pysyvästi Google Sheetsistä?'))return;
  leads=leads.filter(x=>String(x.id)!==String(id));
  selected=null;
  setSyncBadge('loading','Poistetaan...');
  await deleteLeadFromSheets(id);
  setSyncBadge('ok','Poistettu ✓');
  render();
}

async function saveNew(){
  const g=id=>document.getElementById(id)?.value?.trim()||'';
  const company=g('a-company'),contact=g('a-contact');
  if(!company||!contact){alert('Yritys ja yhteyshenkilö ovat pakollisia.');return;}
  const l={id:nextId(),company,contact,role:g('a-role'),industry:g('a-industry'),phone:g('a-phone'),email:g('a-email'),stage:g('a-stage')||'Uusi',prio:g('a-prio')||'Normaali',next:g('a-next'),nextDate:g('a-date'),notes:[]};
  leads.push(l);
  selected=l.id;
  document.getElementById('add-area').innerHTML='';
  setSyncBadge('loading','Tallennetaan...');
  await saveLeadToSheets(l);
  setSyncBadge('ok','Tallennettu ✓');
  render();
}

// ── Password protection ──
const PASSWORD_KEY='ky_crm_auth';
const CORRECT_PASSWORD='Payday2024!';

function checkPw(){
  const val=document.getElementById('pw-input').value;
  if(val===CORRECT_PASSWORD){
    sessionStorage.setItem(PASSWORD_KEY,'ok');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='';
    init();
  }else{
    document.getElementById('pw-error').textContent='Väärä salasana. Yritä uudelleen.';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

function init(){
  if(SCRIPT_URL){loadFromSheets();}
  else{showSetup();setSyncBadge('err','Ei yhdistetty');}
}

if(sessionStorage.getItem(PASSWORD_KEY)==='ok'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='';
  init();
}else{
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
}
</script>
